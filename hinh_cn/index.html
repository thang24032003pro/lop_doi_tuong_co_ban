<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rectangle OOP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        canvas {
            border: 1px solid #000;
            margin-top: 10px;
        }
        .info {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="info" id="output"></div>
    <canvas id="myCanvas" width="800" height="600"></canvas>

    <script>
        class Rectangle {
            constructor(length, width) {
                this.length = parseInt(length);
                this.width = parseInt(width);
            }

            setLength(length) {
                this.length = parseInt(length);
            }

            setWidth(width) {
                this.width = parseInt(width);
            }

            getArea() {
                return this.length * this.width;
            }

            getPerimeter() {
                return (this.length + this.width) * 2;
            }

            draw(canvasId, x, y) {
                const canvas = document.getElementById(canvasId);
                const ctx = canvas.getContext("2d");
                
                // Xóa canvas trước khi vẽ lại
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Vẽ hình chữ nhật
                ctx.fillStyle = "#3498db";
                ctx.fillRect(x, y, this.length, this.width);
                ctx.strokeStyle = "#2980b9";
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, this.length, this.width);
            }
        }

        // 1. Khai báo và khởi tạo một đối tượng thuộc lớp Rectangle
        let rect = new Rectangle(200, 100);

        // Hàm hiển thị thông tin diện tích, chu vi và vẽ lên màn hình
        function displayRectangleInfo(rectangleObj) {
            let output = document.getElementById("output");
            output.innerHTML = `
                <p><strong>Chiều dài:</strong> ${rectangleObj.length}px</p>
                <p><strong>Chiều rộng:</strong> ${rectangleObj.width}px</p>
                <p><strong>Diện tích:</strong> ${rectangleObj.getArea()}px²</p>
                <p><strong>Chu vi:</strong> ${rectangleObj.getPerimeter()}px</p>
            `;
            // 2. Hiển thị hình chữ nhật trên màn hình web tại tọa độ (50, 50)
            rectangleObj.draw("myCanvas", 50, 50);
        }

        // Hiển thị lần đầu
        displayRectangleInfo(rect);

        // 3. Thay đổi chiều dài và chiều rộng của hình chữ nhật sau 3 giây (để quan sát)
        setTimeout(() => {
            rect.setLength(400);
            rect.setWidth(200);
            
            // 4. In lại ra màn hình diện tích và chu vi mới sau khi thay đổi
            displayRectangleInfo(rect);
        }, 3000);
    </script>
</body>
</html>
