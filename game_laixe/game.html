<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Game Lái Xe Đơn Giản</title>
    <style>
        body {
            margin: 0;
            background-color: #2c3e50;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }
        #scoreBoard {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        canvas {
            border: 4px solid #ecf0f1;
            background-color: #34495e;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        #gameOverText {
            display: none;
            position: absolute;
            font-size: 48px;
            color: #e74c3c;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            text-align: center;
        }
        #gameOverText span {
            font-size: 20px;
            color: #fff;
            display: block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="scoreBoard">Điểm số: <span id="score">0</span></div>
    <div id="gameOverText">GAME OVER<span id="restartHint">Nhấn F5 để chơi lại</span></div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const gameOverElement = document.getElementById("gameOverText");

        let score = 0;
        let isGameOver = false;

        // Cấu hình phím bấm
        const keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false,
            Control: false
        };

        // Lớp Xe (Car)
        class Car {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 40;
                this.height = 70;
                this.normalSpeed = 2;
                this.boostSpeed = 5;
                this.currentSpeed = this.normalSpeed;
                this.angle = 0; // Mặc định đầu xe hướng lên trên (0 độ)
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Vẽ thân xe hình chữ nhật (thay cho ảnh .png để đảm bảo code chạy ngay lập tức)
                ctx.fillStyle = "#e74c3c";
                ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);

                // Vẽ đầu xe (định hướng phía trên)
                ctx.fillStyle = "#f1c40f";
                ctx.fillRect(-this.width / 2, -this.height / 2, this.width, 15);

                // Vẽ bánh xe
                ctx.fillStyle = "#111";
                ctx.fillRect(-this.width / 2 - 5, -this.height / 2 + 10, 5, 15);
                ctx.fillRect(this.width / 2, -this.height / 2 + 10, 5, 15);
                ctx.fillRect(-this.width / 2 - 5, this.height / 2 - 25, 5, 15);
                ctx.fillRect(this.width / 2, this.height / 2 - 25, 5, 15);

                ctx.restore();
            }

            update() {
                // Tăng tốc với phím Control (Ctrl)
                if (keys.Control) {
                    this.currentSpeed = this.boostSpeed;
                } else {
                    this.currentSpeed = this.normalSpeed;
                }

                // Xử lý hướng đi theo phím bấm mũi tên
                if (keys.ArrowUp) this.angle = 0;
                if (keys.ArrowDown) this.angle = Math.PI;
                if (keys.ArrowLeft) this.angle = -Math.PI / 2;
                if (keys.ArrowRight) this.angle = Math.PI / 2;

                // Mặc định xe tự động tịnh tiến theo góc nghiêng (angle) hiện tại
                this.x += Math.sin(this.angle) * this.currentSpeed;
                this.y -= Math.cos(this.angle) * this.currentSpeed;

                // Giới hạn biên bản đồ không cho xe chạy ra ngoài khung canvas
                if (this.x < this.width / 2) this.x = this.width / 2;
                if (this.x > canvas.width - this.width / 2) this.x = canvas.width - this.width / 2;
                if (this.y < this.height / 2) this.y = this.height / 2;
                if (this.y > canvas.height - this.height / 2) this.y = canvas.height - this.height / 2;
            }
        }

        // Lớp Vật thể trên bản đồ (Chướng ngại vật và Phần thưởng)
        class GameObject {
            constructor(color, type) {
                this.width = 30;
                this.height = 30;
                // Sinh ngẫu nhiên vị trí trên bản đồ canvas
                this.x = Math.random() * (canvas.width - this.width) + this.width / 2;
                this.y = Math.random() * (canvas.height - this.height) + this.height / 2;
                this.color = color;
                this.type = type; // 'obstacle' hoặc 'reward'
            }

            draw() {
                ctx.fillStyle = this.color;
                if (this.type === 'obstacle') {
                    // Vẽ chướng ngại vật hình vuông khối
                    ctx.fillRect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);
                } else {
                    // Vẽ phần thưởng hình tròn giống đồng xu
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.width / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // Khởi tạo thực thể chiếc xe ở giữa màn hình
        const car = new Car(canvas.width / 2, canvas.height / 2);

        // Tạo danh sách nhiều chướng ngại vật và phần thưởng ngẫu nhiên
        const obstacles = [];
        const rewards = [];

        // Khởi tạo ban đầu: 1 chướng ngại vật cố định ở góc trái theo yêu cầu + 8 ngẫu nhiên
        obstacles.push(new GameObject("#95a5a6", "obstacle")); 
        obstacles[0].x = 50; 
        obstacles[0].y = 50;

        for (let i = 0; i < 8; i++) {
            obstacles.push(new GameObject("#95a5a6", "obstacle"));
        }
        for (let i = 0; i < 5; i++) {
            rewards.push(new GameObject("#2ecc71", "reward")); // Đồng xu/hoa quả màu xanh lá
        }

        // Hàm kiểm tra va chạm giữa xe và vật thể (AABB Collision)
        function checkCollision(rect1, rect2) {
            return (
                rect1.x - rect1.width / 2 < rect2.x + rect2.width / 2 &&
                rect1.x + rect1.width / 2 > rect2.x - rect2.width / 2 &&
                rect1.y - rect1.height / 2 < rect2.y + rect2.height / 2 &&
                rect1.y + rect1.height / 2 > rect2.y - rect2.height / 2
            );
        }

        // Bắt sự kiện bàn phím khi nhấn xuống
        window.addEventListener("keydown", (e) => {
            if (e.key in keys) {
                keys[e.key] = true;
                // Ngăn hiện tượng cuộn trang mặc định của trình duyệt khi ấn phím mũi tên
                if (e.key.startsWith("Arrow")) e.preventDefault(); 
            }
        });

        // Bắt sự kiện bàn phím khi thả ra
        window.addEventListener("keyup", (e) => {
            if (e.key in keys) {
                keys[e.key] = false;
            }
        });

        // Vòng lặp Game chính (Game Loop)
        function gameLoop() {
            if (isGameOver) return;

            // Xóa màn hình cũ để cập nhật khung hình mới
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Cập nhật trạng thái và vẽ Xe
            car.update();
            car.draw();

            // Xử lý và vẽ danh sách chướng ngại vật
            for (let obs of obstacles) {
                obs.draw();
                // Nếu va chạm chướng ngại vật -> Trò chơi kết thúc
                if (checkCollision(car, obs)) {
                    isGameOver = true;
                    gameOverElement.style.display = "block";
                }
            }

            // Xử lý và vẽ danh sách phần thưởng
            for (let i = rewards.length - 1; i >= 0; i--) {
                rewards[i].draw();
                // Nếu ăn được phần thưởng -> Tăng điểm và tái tạo lại phần thưởng ở vị trí mới
                if (checkCollision(car, rewards[i])) {
                    score += 10;
                    scoreElement.innerText = score;
                    // Tạo lại phần thưởng ngẫu nhiên vị trí khác để tiếp tục ăn điểm
                    rewards[i] = new GameObject("#2ecc71", "reward");
                }
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
