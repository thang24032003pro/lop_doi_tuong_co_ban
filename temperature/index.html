<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Temperature Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f6fa;
        }
        .container {
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            margin-top: 0;
        }
        .result {
            margin-top: 15px;
            font-size: 1.1em;
            color: #34495e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Chuyển đổi nhiệt độ</h2>
        <div id="output"></div>
    </div>

    <script>
        class Temperature {
            constructor(celsius) {
                if (celsius < -273) {
                    throw new Error("Nhiệt độ không thể thấp hơn độ không tuyệt đối (-273°C)");
                }
                this.celsius = celsius;
            }

            setCelsius(celsius) {
                if (celsius < -273) {
                    throw new Error("Nhiệt độ không thể thấp hơn độ không tuyệt đối (-273°C)");
                }
                this.celsius = celsius;
            }

            getCelsius() {
                return this.celsius;
            }

            getFahrenheit() {
                return (this.celsius * 1.8) + 32;
            }

            getKelvin() {
                return this.celsius + 273.15;
            }
        }

        // ---- KỊCH BẢN CHƯƠNG TRÌNH ----

        // 1. Khởi tạo một đối tượng thuộc lớp Temperature và gán giá trị 25°C
        let currentTemp = new Temperature(25);

        // 2. Lấy giá trị chuyển đổi
        let celsius = currentTemp.getCelsius();
        let fahrenheit = currentTemp.getFahrenheit();
        let kelvin = currentTemp.getKelvin();

        // 3. Hiển thị ra màn hình trình duyệt web
        document.getElementById("output").innerHTML = `
            <div class="result"><strong>Nhiệt độ gốc:</strong> ${celsius}°C</div>
            <div class="result"><strong>Độ F (Fahrenheit):</strong> ${fahrenheit}°F</div>
            <div class="result"><strong>Độ K (Kelvin):</strong> ${kelvin}K</div>
        `;
    </script>
</body>
</html>
